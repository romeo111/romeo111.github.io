<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ELINTIR - Redirecting</title>
    <meta name="robots" content="noindex">
    <style>
      body {
        display: grid;
        min-height: 100svh;
        margin: 0;
        place-items: center;
        background: #10151a;
        color: #f2f4ec;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      main {
        width: min(520px, calc(100% - 36px));
        padding: 28px;
        border: 1px solid rgba(242, 244, 236, 0.18);
        border-radius: 8px;
        background: rgba(16, 21, 26, 0.92);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 42px;
      }

      p {
        color: #b8c0b6;
        line-height: 1.6;
      }

      a {
        color: #25d9c6;
        font-weight: 800;
      }
    </style>
    <script>
      const base = location.hostname.endsWith("github.io") ? "/elintir_mapper/" : "/";
      location.replace(base);
    </script>
  </head>
  <body>
    <main>
      <h1>ELINTIR</h1>
      <p>This page moved to the landing page.</p>
      <a href="/">Open landing</a>
    </main>
  </body>
</html>
